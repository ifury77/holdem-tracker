<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>

    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#050c18"/>
    </radialGradient>

    <!-- Blue gem gradient -->
    <linearGradient id="gemGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#a8d8ff"/>
      <stop offset="30%" stop-color="#5aaeff"/>
      <stop offset="70%" stop-color="#1a6abf"/>
      <stop offset="100%" stop-color="#0d3a7a"/>
    </linearGradient>

    <!-- Crown gradient -->
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8e8ff"/>
      <stop offset="40%" stop-color="#6ab8ff"/>
      <stop offset="100%" stop-color="#2255aa"/>
    </linearGradient>

    <!-- Body/figure gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0d2248"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddeeff"/>
      <stop offset="100%" stop-color="#aaccee"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle dark circle behind figure -->
    <ellipse cx="512" cy="480" rx="340" ry="300" fill="#0a1830" opacity="0.8"/>

    <!-- ===== CROWN ===== -->
    <g filter="url(#softShadow)">
      <!-- Crown base band -->
      <rect x="320" y="270" width="384" height="60" rx="10" fill="url(#crownGrad)" stroke="#0a2255" stroke-width="4"/>
      <!-- Crown points -->
      <!-- Left point -->
      <polygon points="330,270 355,160 380,270" fill="url(#crownGrad)" stroke="#0a2255" stroke-width="3"/>
      <!-- Left-center point -->
      <polygon points="400,270 430,185 460,270" fill="url(#crownGrad)" stroke="#0a2255" stroke-width="3"/>
      <!-- Center point (tallest) -->
      <polygon points="462,270 512,130 562,270" fill="url(#crownGrad)" stroke="#0a2255" stroke-width="3"/>
      <!-- Right-center point -->
      <polygon points="564,270 594,185 624,270" fill="url(#crownGrad)" stroke="#0a2255" stroke-width="3"/>
      <!-- Right point -->
      <polygon points="644,270 669,160 694,270" fill="url(#crownGrad)" stroke="#0a2255" stroke-width="3"/>

      <!-- Crown jewel tips -->
      <rect x="344" y="150" width="22" height="22" rx="4" transform="rotate(45,355,161)" fill="#c8e8ff"/>
      <rect x="419" y="175" width="20" height="20" rx="4" transform="rotate(45,429,185)" fill="#c8e8ff"/>
      <rect x="500" y="118" width="24" height="24" rx="4" transform="rotate(45,512,130)" fill="#ffffff"/>
      <rect x="583" y="175" width="20" height="20" rx="4" transform="rotate(45,593,185)" fill="#c8e8ff"/>
      <rect x="657" y="150" width="22" height="22" rx="4" transform="rotate(45,668,161)" fill="#c8e8ff"/>
    </g>

    <!-- ===== GEM / DIAMOND (center top of figure) ===== -->
    <g filter="url(#glow)" transform="translate(512, 320)">
      <!-- Diamond shape -->
      <polygon points="0,-62 52,-20 52,20 0,62 -52,20 -52,-20" fill="url(#gemGrad)" stroke="#0a2255" stroke-width="4"/>
      <!-- Gem facets -->
      <polygon points="0,-62 52,-20 0,0" fill="#a8d8ff" opacity="0.5"/>
      <polygon points="0,-62 -52,-20 0,0" fill="#6ab8ff" opacity="0.3"/>
      <polygon points="0,0 52,20 0,62" fill="#1a4a9a" opacity="0.5"/>
      <polygon points="0,0 -52,20 0,62" fill="#0d3070" opacity="0.6"/>
      <!-- Center shine -->
      <ellipse cx="-12" cy="-20" rx="14" ry="10" fill="#ffffff" opacity="0.35" transform="rotate(-20)"/>
    </g>

    <!-- ===== BODY / FIGURE ===== -->
    <g filter="url(#softShadow)">
      <!-- Shoulders arc -->
      <ellipse cx="512" cy="590" rx="240" ry="180" fill="url(#bodyGrad)" stroke="#0a2255" stroke-width="4"/>
      <!-- Body rectangle -->
      <rect x="390" y="430" width="244" height="260" rx="20" fill="url(#bodyGrad)" stroke="#0a2255" stroke-width="4"/>

      <!-- Jersey R letter -->
      <rect x="460" y="470" width="104" height="120" rx="12" fill="#1a3a6e" stroke="#6aacee" stroke-width="3"/>
      <text x="512" y="556" font-family="'Arial Black', Impact, sans-serif" font-size="80" font-weight="900" text-anchor="middle" fill="#c8e8ff" stroke="#0a2255" stroke-width="3">R</text>
    </g>

    <!-- ===== CARDS ===== -->
    <!-- Left card (tilted left) -->
    <g transform="rotate(-30, 370, 580)" filter="url(#softShadow)">
      <rect x="240" y="470" width="140" height="190" rx="14" fill="url(#cardGrad)" stroke="#1a3a6e" stroke-width="4"/>
      <!-- Club suit top-left -->
      <text x="255" y="510" font-family="Georgia, serif" font-size="32" fill="#1a3a6e">♣</text>
      <!-- Heart suit bottom-right (rotated) -->
      <text x="358" y="648" font-family="Georgia, serif" font-size="32" fill="#1a3a6e" transform="rotate(180,358,648)">♥</text>
    </g>

    <!-- Right card (tilted right) -->
    <g transform="rotate(30, 654, 580)" filter="url(#softShadow)">
      <rect x="644" y="470" width="140" height="190" rx="14" fill="url(#cardGrad)" stroke="#1a3a6e" stroke-width="4"/>
      <!-- Spade suit top-left -->
      <text x="659" y="510" font-family="Georgia, serif" font-size="32" fill="#1a3a6e">♠</text>
      <!-- Diamond suit bottom-right -->
      <text x="762" y="648" font-family="Georgia, serif" font-size="32" fill="#1a3a6e" transform="rotate(180,762,648)">♦</text>
    </g>

    <!-- ===== TEXT BANNER ===== -->
    <!-- Banner background -->
    <rect x="80" y="740" width="864" height="110" rx="10" fill="#0a1830" stroke="#3a7acc" stroke-width="3"/>
    <!-- Horizontal lines above/below (like original) -->
    <line x1="60" y1="745" x2="964" y2="745" stroke="#3a7acc" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="848" x2="964" y2="848" stroke="#3a7acc" stroke-width="4" stroke-linecap="round"/>
    <!-- Small end circles -->
    <circle cx="60" cy="745" r="6" fill="#6aacee"/>
    <circle cx="964" cy="745" r="6" fill="#6aacee"/>
    <circle cx="60" cy="848" r="6" fill="#6aacee"/>
    <circle cx="964" cy="848" r="6" fill="#6aacee"/>

    <!-- Text -->
    <text x="512" y="817" 
      font-family="'Arial Black', Impact, 'Franklin Gothic Heavy', sans-serif" 
      font-size="68" 
      font-weight="900" 
      text-anchor="middle" 
      fill="#6ab8ff"
      stroke="#0a2255"
      stroke-width="6"
      paint-order="stroke"
      filter="url(#textGlow)"
      letter-spacing="3">RIVER RAT MASTERS</text>
  </g>
</svg>
